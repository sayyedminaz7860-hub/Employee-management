<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System | Modern UI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fas fa-users-cog me-2"></i>EmpManager
            </a>
        </div>
    </nav>

    <div class="container main-content">
        <!-- Summary Section -->
        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <div class="card summary-card border-0 shadow-sm secondary-gradient">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center">
                            <div class="icon-box me-3">
                                <i class="fas fa-user-friends fa-2x"></i>
                            </div>
                            <div>
                                <h6 class="card-subtitle mb-1">Total Employees</h6>
                                <h2 class="card-title mb-0 fw-bold" id="totalCount">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card summary-card border-0 shadow-sm primary-gradient text-white">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center">
                            <div class="icon-box me-3">
                                <i class="fas fa-money-bill-wave fa-2x text-white"></i>
                            </div>
                            <div>
                                <h6 class="card-subtitle mb-1">Total Payroll</h6>
                                <h2 class="card-title mb-0 fw-bold" id="totalSalary">$0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Employee Directory</h4>
            <button class="btn btn-primary d-flex align-items-center" data-bs-toggle="modal" data-bs-target="#employeeModal" id="addBtn">
                <i class="fas fa-plus me-2"></i> Add Employee
            </button>
        </div>

        <!-- Table Display -->
        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="employeeTable">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">ID</th>
                            <th>Name</th>
                            <th>Salary</th>
                            <th>Gender</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeeList">
                        <!-- Data will be injected here via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Employee Modal (Add/Edit) -->
    <div class="modal fade" id="employeeModal" tabindex="-1" aria-labelledby="employeeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="employeeModalLabel">Employee Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="employeeForm">
                        <input type="hidden" id="editIndex" value="-1">
                        <div class="mb-3">
                            <label for="empId" class="form-label fw-medium">Employee ID</label>
                            <input type="text" class="form-control" id="empId" placeholder="e.g. 101" required>
                        </div>
                        <div class="mb-3">
                            <label for="empName" class="form-label fw-medium">Full Name</label>
                            <input type="text" class="form-control" id="empName" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label for="empSalary" class="form-label fw-medium">Salary ($)</label>
                            <input type="number" class="form-control" id="empSalary" placeholder="50000" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium d-block">Gender</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="empGender" id="genderMale" value="Male" checked>
                                <label class="form-check-label" for="genderMale">Male</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="empGender" id="genderFemale" value="Female">
                                <label class="form-check-label" for="genderFemale">Female</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="empGender" id="genderOther" value="Other">
                                <label class="form-check-label" for="genderOther">Other</label>
                            </div>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary py-2 fw-bold" id="submitBtn">Save Employee</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage"></div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
