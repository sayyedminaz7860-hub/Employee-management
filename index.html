<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmpManager | Professional Employee Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm mb-4 sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <div class="icon-box me-2" style="width: 35px; height: 35px; background: rgba(255,255,255,0.2);">
                    <i class="fas fa-users-cog text-white" style="font-size: 1rem;"></i>
                </div>
                EmpManager
            </a>
            <div class="d-flex align-items-center">
                <div id="themeToggle" class="me-3 text-white">
                    <i class="fas fa-moon" id="themeIcon"></i>
                </div>
                <span class="text-white-50 small d-none d-md-inline">v2.0 Premium</span>
            </div>
        </div>
    </nav>

    <div class="container main-content">
        <!-- Summary Section -->
        <div class="row g-4 mb-5 animate-fade-in">
            <div class="col-md-6 col-lg-3">
                <div class="card summary-card border-0 shadow-sm secondary-gradient h-100">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center">
                            <div class="icon-box me-3">
                                <i class="fas fa-user-friends fa-lg"></i>
                            </div>
                            <div>
                                <h6 class="card-subtitle mb-1 opacity-75">Total Staff</h6>
                                <h2 class="card-title mb-0 fw-bold" id="totalCount">0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="card summary-card border-0 shadow-sm bg-white h-100">
                    <div class="card-body p-4 text-primary">
                        <div class="d-flex align-items-center">
                            <div class="icon-box me-3" style="background: rgba(79, 70, 229, 0.1);">
                                <i class="fas fa-money-bill-wave fa-lg"></i>
                            </div>
                            <div>
                                <h6 class="card-subtitle mb-1 text-muted">Total Payroll</h6>
                                <h2 class="card-title mb-0 fw-bold" id="totalSalary">$0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="card summary-card border-0 shadow-sm bg-white h-100">
                    <div class="card-body p-4 text-success">
                        <div class="d-flex align-items-center">
                            <div class="icon-box me-3" style="background: rgba(16, 185, 129, 0.1);">
                                <i class="fas fa-chart-line fa-lg"></i>
                            </div>
                            <div>
                                <h6 class="card-subtitle mb-1 text-muted">Avg. Salary</h6>
                                <h2 class="card-title mb-0 fw-bold" id="avgSalary">$0</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6 col-lg-3">
                <div class="card summary-card border-0 shadow-sm primary-gradient text-white h-100">
                    <div class="card-body p-4">
                        <div class="d-flex align-items-center">
                            <div class="icon-box me-3">
                                <i class="fas fa-bolt fa-lg"></i>
                            </div>
                            <div>
                                <h6 class="card-subtitle mb-1 opacity-75">Efficiency</h6>
                                <h2 class="card-title mb-0 fw-bold">98.4%</h2>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Header -->
        <div class="row mb-4 align-items-center g-3">
            <div class="col-md-4">
                <h4 class="fw-bold mb-0">Employee Directory</h4>
            </div>
            <div class="col-md-8">
                <div class="d-flex flex-wrap justify-content-md-end gap-2">
                    <div class="search-wrapper flex-grow-1">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" class="form-control" placeholder="Search by name, ID or role...">
                    </div>
                    <button class="btn btn-outline-primary" id="exportBtn">
                        <i class="fas fa-download me-2"></i> Export
                    </button>
                    <button class="btn btn-primary d-flex align-items-center" data-bs-toggle="modal" data-bs-target="#employeeModal" id="addBtn">
                        <i class="fas fa-plus me-2"></i> Add New
                    </button>
                </div>
            </div>
        </div>

        <!-- Table Display -->
        <div class="card-table-container shadow-sm mb-4">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="employeeTable">
                    <thead>
                        <tr>
                            <th class="ps-4" onclick="sortData('id')">ID <i class="fas fa-sort ms-1 small opacity-50"></i></th>
                            <th onclick="sortData('name')">Employee <i class="fas fa-sort ms-1 small opacity-50"></i></th>
                            <th onclick="sortData('role')">Role <i class="fas fa-sort ms-1 small opacity-50"></i></th>
                            <th onclick="sortData('salary')">Salary <i class="fas fa-sort ms-1 small opacity-50"></i></th>
                            <th>Gender</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeeList">
                        <!-- Data will be injected here via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Pagination -->
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
            <div class="text-muted small" id="showingEntries">
                Showing entries 1 to 5 of 10
            </div>
            <nav aria-label="Page navigation">
                <ul class="pagination pagination-sm mb-0" id="pagination">
                    <!-- Pagination items will be injected here -->
                </ul>
            </nav>
        </div>
    </div>

    <!-- Employee Modal (Add/Edit) -->
    <div class="modal fade" id="employeeModal" tabindex="-1" aria-labelledby="employeeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="employeeModalLabel">Employee Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="employeeForm">
                        <input type="hidden" id="editIndex" value="-1">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="empId" class="form-label fw-medium small">Employee ID</label>
                                <input type="text" class="form-control" id="empId" placeholder="e.g. EMP-101" required>
                            </div>
                            <div class="col-md-6">
                                <label for="empSalary" class="form-label fw-medium small">Salary ($)</label>
                                <input type="number" class="form-control" id="empSalary" placeholder="e.g. 75000" required>
                            </div>
                            <div class="col-12">
                                <label for="empName" class="form-label fw-medium small">Full Name</label>
                                <input type="text" class="form-control" id="empName" placeholder="e.g. Jonathan Doe" required>
                            </div>
                            <div class="col-12">
                                <label for="empEmail" class="form-label fw-medium small">Email Address</label>
                                <input type="email" class="form-control" id="empEmail" placeholder="e.g. john@company.com" required>
                            </div>
                            <div class="col-12">
                                <label for="empRole" class="form-label fw-medium small">Job Title / Role</label>
                                <input type="text" class="form-control" id="empRole" placeholder="e.g. Senior Developer" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-medium small d-block">Gender Identity</label>
                                <div class="d-flex gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="empGender" id="genderMale" value="Male" checked>
                                        <label class="form-check-label small" for="genderMale">Male</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="empGender" id="genderFemale" value="Female">
                                        <label class="form-check-label small" for="genderFemale">Female</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="empGender" id="genderOther" value="Other">
                                        <label class="form-check-label small" for="genderOther">Other</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary py-2 fw-bold" id="submitBtn">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Deletion Confirmation Modal -->
    <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content border-0 text-center p-3">
                <div class="modal-body">
                    <div class="text-danger mb-3">
                        <i class="fas fa-exclamation-circle fa-4x"></i>
                    </div>
                    <h5 class="fw-bold">Are you sure?</h5>
                    <p class="text-muted small">This action cannot be undone. All data for this employee will be lost.</p>
                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-light flex-grow-1" data-bs-dismiss="modal">Cancel</button>
                        <button type="button" class="btn btn-danger flex-grow-1" id="confirmDeleteBtn">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Alert Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast align-items-center border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center" id="toastMessage">
                    <!-- Icon and Message will be injected here -->
                </div>
                <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
